    </style>
</head>

    <script>
        // 微信聊天链接
        const WECHAT_URL = "weixin://dl/chat?wxid_x3wygpbtthl222_54be";
        let autoJumpTimer = null;
        // 关闭弹窗 + 清除定时器
        function closeModal() {
            const modal = document.getElementById('wechatModal');
            modal.style.display = 'none';
            if(autoJumpTimer){
                clearTimeout(autoJumpTimer);
                autoJumpTimer = null;
            }
        }
        // 点击购买逻辑
        function goToWeChat(goodsName) {
            const modal = document.getElementById('wechatModal');
            modal.style.display = 'flex';
            if(autoJumpTimer){
                clearTimeout(autoJumpTimer);
            }
            // 30秒自动唤起微信
            autoJumpTimer = setTimeout(function(){
                window.location.href = WECHAT_URL;
                closeModal();
            }, 15000);
        }
        // 分享功能
        function shareSite() {
            const url = window.location.href;
            const title = document.title;
            if (navigator.share) {
                navigator.share({
                    title: title,
                    url: url
                }).catch(function () {
                    const input = document.createElement('input');
                    input.value = url;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    alert('链接已复制，可以转发分享啦！');
                });
            } else {
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                alert('链接已复制，可以转发分享啦！');
            }
        }
        // 渲染静态文字
        document.querySelector('.logo').innerText = CONFIG.siteName;
        document.querySelector('.qr-module-top p').innerText = CONFIG.qrTextTop;
        document.querySelector('.float-qr-box p').innerText = CONFIG.qrTextFloat;
        document.querySelector('.qr-wechat p').innerText = CONFIG.qrTextBottomWechat;
        document.querySelector('.qr-site p').innerText = CONFIG.qrTextBottomSite;
        document.querySelector('.warm-tip').innerText = CONFIG.warmTip;
        document.querySelector('.copyright').innerText = CONFIG.copyright;
        // 渲染产品列表
        const container = document.getElementById('productContainer');
        CONFIG.productList.forEach(group => {
            const wrap = document.createElement('div');
            wrap.className = 'series-wrap';
            wrap.innerHTML = '<h2 class="series-title"></h2><div class="product-grid"></div>';
            const grid = wrap.querySelector('.product-grid');
            group.forEach((item, idx) => {
                let cardClass = '';
                let dataTip = '';
                if (idx === 0) {
                    cardClass = 'product-card basic';
                    dataTip = `data-tip-hover="${CONFIG.tipHoverBasic}"`;
                } else if (idx === 1) {
                    cardClass = 'product-card advanced';
                    dataTip = `data-tip-click="${CONFIG.tipClickAdvanced}"`;
                } else {
                    cardClass = 'product-card premium';
                    dataTip = `data-tip-click="${CONFIG.tipClickPremium}"`;
                }
                const card = document.createElement('div');
                card.className = cardClass;
                const tipKey = dataTip.split('=')[0];
                const tipVal = dataTip.split('=')[1].replace(/"/g, '');
                card.setAttribute(tipKey, tipVal);
                card.innerHTML = `
                    <div class="tip-box"></div>
                    <div class="product-image">${item.imgText}</div>
                    <div class="product-info">
                        <h3 class="product-title">${item.name}</h3>
                        <p class="product-desc">${item.desc}</p>
                        <div class="product-price">${item.price}</div>
                        <a href="javascript:;" onclick="goToWeChat('${item.name}')" class="buy-btn">立即购买</a>
                    </div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(wrap);
        });
        // 基础款悬浮提示
        const hoverCards = document.querySelectorAll('.product-card.basic');
        hoverCards.forEach(card => {
            const tip = card.querySelector('.tip-box');
            const text = card.dataset.tipHover;
            card.addEventListener('mousemove', e => {
                tip.innerText = text;
                tip.style.display = 'block';
                tip.style.left = (e.offsetX + 10) + 'px';
                tip.style.top = (e.offsetY + 10) + 'px';
            });
            card.addEventListener('mouseleave', () => {
                tip.style.display = 'none';
            });
        });
        // 进阶/尊享款点击提示
        const clickCards = document.querySelectorAll('.product-card.advanced, .product-card.premium');
        clickCards.forEach(card => {
            const tip = card.querySelector('.tip-box');
            const text = card.dataset.tipClick;
            card.addEventListener('click', e => {
                tip.innerText = text;
                tip.style.display = 'block';
                tip.style.left = (e.offsetX + 10) + 'px';
                tip.style.top = (e.offsetY + 10) + 'px';
                setTimeout(() => tip.style.display = 'none', 2000);
            });
        });
        // 游走二维码动画
        const floatBox = document.querySelector('.float-qr-box');
        let x = 10, y = 10;
        let speedX = 2.2;
        let speedY = 1.8;
        function moveBox() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const boxW = floatBox.offsetWidth;
            const boxH = floatBox.offsetHeight;
            if (x <= 0 || x + boxW >= winW) speedX = -speedX;
            if (y <= 0 || y + boxH >= winH) speedY = -speedY;
            x += speedX;
            y += speedY;
            floatBox.style.left = x + 'px';
            requestAnimationFrame(moveBox);
        }
        moveBox();
        window.addEventListener('resize', () => {
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const boxW = floatBox.offsetWidth;
            const boxH = floatBox.offsetHeight;
            if (x + boxW > winW) x = winW - boxW;
            if (y + boxH > winH) y = winH - boxH;
        });

        // ========== 最终下载逻辑（无跨域、本地正常加载、不跳转、无空白图） ==========
        const siteQrcode = document.getElementById('siteQrcode');
        const downloadTip = document.getElementById('downloadTip');

        siteQrcode.addEventListener('click', function(e) {
            // 阻止默认行为，绝对不跳转新页面
            e.preventDefault();
            e.stopPropagation();

            const imgSrc = this.src;
            // 新建图片对象预加载，解决画布空白
            const tempImg = new Image();
            // 允许本地图片正常加载
            tempImg.src = imgSrc;

            tempImg.onload = function() {
                // 创建画布
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = tempImg.width;
                canvas.height = tempImg.height;

                // 填充白色底色，杜绝透明空白
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 绘制二维码
                ctx.drawImage(tempImg, 0, 0);

                // 触发下载
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        downloadTip.innerText = "保存失败，请长按图片";
                        downloadTip.style.display = 'block';
                        setTimeout(() => downloadTip.style.display = 'none', 2000);
                        return;
                    }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "本站二维码.png";
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    downloadTip.innerText = "二维码已保存";
                    downloadTip.style.display = 'block';
                    setTimeout(() => downloadTip.style.display = 'none', 2000);
                }, 'image/png');
            };

            // 加载失败兜底
            tempImg.onerror = function() {
                downloadTip.innerText = "请长按图片保存";
                downloadTip.style.display = 'block';
                setTimeout(() => downloadTip.style.display = 'none', 2000);
            };
        });
    </script>
</body>
</html>
